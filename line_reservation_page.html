<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ご予約フォーム</title>
  <style>
    :root {
      --bg: #f7f8fc;
      --card: #ffffff;
      --text: #1f2937;
      --sub: #6b7280;
      --line: #dbe2ea;
      --accent: #06c755;
      --accent-dark: #05a847;
      --danger: #d92d20;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", "Noto Sans JP", sans-serif;
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }

    .wrap {
      max-width: 560px;
      margin: 0 auto;
      padding: 20px 14px 40px;
    }

    .hero {
      background: linear-gradient(135deg, #06c755 0%, #2fd56f 100%);
      color: #fff;
      border-radius: 18px;
      padding: 22px 18px;
      box-shadow: 0 12px 28px rgba(6, 199, 85, 0.18);
      margin-bottom: 16px;
    }

    .hero .badge {
      display: inline-block;
      background: rgba(255,255,255,0.18);
      padding: 6px 10px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .hero h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.3;
    }

    .hero p {
      margin: 0;
      font-size: 14px;
      opacity: 0.96;
    }

    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 18px;
      box-shadow: 0 8px 24px rgba(16, 24, 40, 0.06);
      border: 1px solid #edf1f5;
    }

    .steps {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 16px;
    }

    .step {
      background: #f2fdf7;
      color: #08763a;
      border: 1px solid #ccefd8;
      border-radius: 12px;
      text-align: center;
      padding: 10px 8px;
      font-size: 12px;
      font-weight: 700;
    }

    form {
      display: grid;
      gap: 14px;
    }

    label {
      display: block;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 6px;
    }

    .required::after {
      content: "必須";
      display: inline-block;
      margin-left: 8px;
      padding: 2px 7px;
      border-radius: 999px;
      background: #fff1f1;
      color: var(--danger);
      font-size: 11px;
      font-weight: 700;
      vertical-align: middle;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 12px;
      padding: 14px 14px;
      font-size: 16px;
      background: #fff;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 4px rgba(6, 199, 85, 0.12);
    }

    textarea { min-height: 110px; resize: vertical; }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .help {
      font-size: 12px;
      color: var(--sub);
      margin-top: 6px;
    }

    .checkbox {
      display: flex;
      gap: 10px;
      align-items: flex-start;
      font-size: 13px;
      color: var(--sub);
      background: #fafbfc;
      border: 1px solid #edf1f5;
      border-radius: 12px;
      padding: 12px;
    }

    .checkbox input {
      width: 18px;
      height: 18px;
      margin-top: 2px;
      flex: 0 0 18px;
    }

    .btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 16px 18px;
      font-size: 16px;
      font-weight: 800;
      cursor: pointer;
      background: var(--accent);
      color: #fff;
      box-shadow: 0 10px 20px rgba(6, 199, 85, 0.22);
      transition: background 0.2s, transform 0.05s;
    }

    .btn:hover { background: var(--accent-dark); }
    .btn:active { transform: translateY(1px); }

    .note {
      margin-top: 14px;
      font-size: 12px;
      color: var(--sub);
      text-align: center;
    }

    .footer-box {
      margin-top: 16px;
      font-size: 13px;
      color: var(--sub);
      background: #fff;
      border: 1px solid #edf1f5;
      border-radius: 14px;
      padding: 14px;
    }

    .success {
      display: none;
      margin-top: 14px;
      background: #ecfdf3;
      border: 1px solid #abefc6;
      color: #067647;
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
      font-weight: 700;
    }

    @media (max-width: 480px) {
      .hero h1 { font-size: 24px; }
      .grid-2 { grid-template-columns: 1fr; }
      .steps { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="hero">
      <div class="badge">LINEから簡単予約</div>
      <h1>マンジャロオンライン外来｜中央区オンライン医療ダイエット<br>ご予約フォーム</h1>
      <p>必要事項をご入力ください。ご予約後、事前問診をご入力いただき、医師によるビデオ診察を行います。診察の結果、処方できない場合があります。</p>
    </div>

    <div class="card">
      <div class="steps">
        <div class="step">1. 入力</div>
        <div class="step">2. 送信</div>
        <div class="step">3. 予約確定</div>
      </div>

      <!-- action を実際の送信先URLに変更してください -->
      <form id="reservationForm" action="https://formspree.io/f/xxxxxxxx" method="POST">
        <div>
          <label class="required" for="name">お名前</label>
          <input id="name" name="お名前" type="text" placeholder="例）山田 花子" required />
        </div>

        <div class="grid-2">
          <div>
            <label class="required" for="tel">電話番号</label>
            <input id="tel" name="電話番号" type="tel" inputmode="tel" placeholder="例）09012345678" required />
          </div>
          <div>
            <label class="required" for="email">メールアドレス</label>
            <input id="email" name="メールアドレス" type="email" placeholder="例）sample@example.com" required />
          </div>
        </div>

        <div>
          <label class="required" for="menu">ご希望メニュー</label>
          <select id="menu" name="ご希望メニュー" required>
            <option value="">選択してください</option>
            <option>初回カウンセリング</option>
            <option>オンライン診療</option>
            <option>来院予約</option>
            <option>再診予約</option>
            <option>その他</option>
          </select>
        </div>

        <div class="grid-2">
          <div>
            <label class="required" for="date">第1希望日</label>
            <input id="date" name="第1希望日" type="date" required />
          </div>
          <div>
            <label class="required" for="time">第1希望時間</label>
            <select id="time" name="第1希望時間" required>
              <option value="">選択してください</option>
              <option>10:00〜11:00</option>
              <option>11:00〜12:00</option>
              <option>12:00〜13:00</option>
              <option>13:00〜14:00</option>
              <option>14:00〜15:00</option>
              <option>15:00〜16:00</option>
              <option>16:00〜17:00</option>
              <option>17:00〜18:00</option>
              <option>18:00〜19:00</option>
            </select>
          </div>
        </div>

        <div class="grid-2">
          <div>
            <label for="date2">第2希望日</label>
            <input id="date2" name="第2希望日" type="date" />
          </div>
          <div>
            <label for="time2">第2希望時間</label>
            <select id="time2" name="第2希望時間">
              <option value="">選択してください</option>
              <option>10:00〜11:00</option>
              <option>11:00〜12:00</option>
              <option>12:00〜13:00</option>
              <option>13:00〜14:00</option>
              <option>14:00〜15:00</option>
              <option>15:00〜16:00</option>
              <option>16:00〜17:00</option>
              <option>17:00〜18:00</option>
              <option>18:00〜19:00</option>
            </select>
          </div>
        </div>

        <div>
          <label for="note">ご相談内容・備考</label>
          <textarea id="note" name="ご相談内容・備考" placeholder="例）オンライン診療希望、現在服用中の薬、確認したいこと等"></textarea>
          <div class="help">症状やご希望がある場合はこちらにご記入ください。</div>
        </div>

        <label class="checkbox">
          <input type="checkbox" name="個人情報同意" required />
          <span>個人情報の取扱いに同意のうえ送信します。</span>
        </label>

        <input type="hidden" name="_subject" value="【LINE予約】新規予約申込" />
        <button type="submit" class="btn">予約内容を送信する</button>
      </form>

      <div id="successMessage" class="success">送信されました。担当より順次ご連絡いたします。</div>
      <div class="note">※ 送信時点では予約確定ではありません。</div>
    </div>

    <div class="footer-box">
      <strong>LINE連携方法</strong><br>
      このページを公開したURLを、LINE公式アカウントの「リッチメニュー」「あいさつメッセージ」「予約ボタン」に設定してください。
    </div>
  </div>

  <script>
    const form = document.getElementById('reservationForm');
    const successMessage = document.getElementById('successMessage');

    form.addEventListener('submit', async function (e) {
      const action = form.getAttribute('action');

      // formspree未設定のままでも画面確認できるようにする
      if (action.includes('xxxxxxxx')) {
        e.preventDefault();
        successMessage.style.display = 'block';
        successMessage.textContent = '画面サンプルです。実際に使う場合は form の action を送信先URLに変更してください。';
        successMessage.scrollIntoView({ behavior: 'smooth', block: 'center' });
      }
    });
  </script>
</body>
</html>
